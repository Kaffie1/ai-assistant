<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Assistant Web Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/web/styles.css?v=20260419-buttons-2" />
  </head>
  <body>
    <div class="bg"></div>
    <main class="layout">
      <section class="panel head">
        <h1>秘书型 AI 助手</h1>
        <p>浏览器问答版，已接入记忆检索、自学习与工具调用。</p>
        <span id="modeBadge" class="badge">连接中...</span>
      </section>

      <section id="chatBox" class="panel chat"></section>

      <section class="panel composer">
        <div class="inputRow">
          <textarea id="input" placeholder="直接描述你的需求，例如：过一分钟后提醒我喝水。按 Enter 发送，Shift+Enter 换行"></textarea>
          <button id="voiceBtn" type="button" title="语音输入" aria-label="语音输入">录</button>
          <button id="sendBtn" type="button" title="发送消息" aria-label="发送消息">发</button>
        </div>
        <div id="learnMeta" class="learnMeta"></div>
      </section>
    </main>
    <script src="/web/app.js?v=20260419-buttons-2"></script>
  </body>
</html>
